apiVersion: v1
## Remember this is not actual instance of storage. It just tells k8 an option it seeks for
## having the below specs.
kind: PersistentVolumeClaim
metadata:
  name: database-persistent-volume-claim
spec:
  ## If we attach the below spec(PVC) to the postgres pod and feed the config to the k8, it
  ## will find an instance of storage that supports the below access modes and have
  ## 2Gi of storage.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi